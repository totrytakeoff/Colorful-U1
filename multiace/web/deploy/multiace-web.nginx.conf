# multiACE Web - nginx location block.
#
# Drop-in for the existing fluidd / mainsail nginx config:
#   /etc/nginx/fluidd.d/multiace-web.conf
# The auth-check.conf shipped by paxx fb-http already exposes
# /auth_check internally; we piggyback on it so multiACE inherits
# the same Moonraker-managed authentication.

location /multiace/ {
    auth_request /auth_check;
    access_log off;

    proxy_pass http://127.0.0.1:7126/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket upgrade for /multiace/ws
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # WS streams must not be buffered or timed out aggressively
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
