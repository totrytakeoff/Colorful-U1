[save_variables]
filename: /home/lava/printer_data/config/extended/multiace/ace_vars.cfg
[ace]
ace_device_count: 1
enable_ace_v2: true
v2_order: first

# Toolhead filament source topology.
# native: stock U1 feeder path for that toolhead.
# ace: one or more ACE devices feed this toolhead through a physical 4-to-1
# PTFE merge. Assign each physical ACE with aceN_head below.
head0_mode: ace
head1_mode: native
head2_mode: native
head3_mode: native

# Per-ACE physical target head. Use 0..3 or none.
ace0_head: 0

update_url_base: https://postapocalyptic-diy.com/software/updates


language: en
display_index_base: 1

state_debug: false
usb_debug: false
fa_debug: false

baud: 115200
feed_speed: 80
retract_speed: 80

retract_length: 1950
load_length: 2100

# ACE 2 (V2) only: wait for the device to report the unwind finished
# (its own feed-port sensor cleared) instead of a fixed-length time dwell.
# retract_length then acts as a safety upper bound. V1 devices ignore this.
#ace2_sensor_unload: False

load_retry: 3
load_retry_retract: 50

extrusion_retry: 7
extrusion_retry_retract: 30
extrusion_retry_retract_a: 50
wiggle_scheme: EAEAEAE

unload_retry: 3

max_dryer_temperature: 70
dryer_temp: 55
dryer_duration: 240

swap_default_temp: 250
swap_retract_length: 1800
swap_purge_length: 0
swap_anti_ooze_retract: 10

v2_feed_check_check_length: 254
v2_feed_check_error_length: 254

# V2 print-time feed assist. Defaults are fine; uncomment to tune.
#   v2_print_assist_mode: constant   # constant (default) | tracked
#     constant = ACE assists gently, filament follows the extruder's pull
#       (no per-tick speed tracking) - avoids bowden flex when the extruder
#       out-pulls the ACE. Only flips to unwind on a sustained reverse.
#     tracked  = legacy: quantize live extruder velocity, push speed each tick.
#   v2_constant_assist_speed: 0      # 0 = ACE firmware default; >0 = pin once
#   v2_assist_confirm_time: 0.5      # s a reverse must hold before unwind flip


[gcode_macro ACEA__Switch_0]
description: Switch to ACE 0
gcode:
  ACE_SWITCH TARGET=0
[gcode_macro ACEA__Switch_1]
description: Switch to ACE 1
gcode:
  ACE_SWITCH TARGET=1
[gcode_macro ACEA__Switch_2]
description: Switch to ACE 2
gcode:
  ACE_SWITCH TARGET=2
[gcode_macro ACEA__Switch_3]
description: Switch to ACE 3
gcode:
  ACE_SWITCH TARGET=3
[gcode_macro ACEC__Unload_All]
description: Unload all toolheads that have filament
gcode:
  ACE_UNLOAD_ALL_HEADS
[gcode_macro ACEC__Unload_T0]
description: Unload T0 back to its ACE
gcode:
  ACE_UNLOAD_HEAD HEAD=0
[gcode_macro ACEC__Unload_T1]
description: Unload T1 back to its ACE
gcode:
  ACE_UNLOAD_HEAD HEAD=1
[gcode_macro ACEC__Unload_T2]
description: Unload T2 back to its ACE
gcode:
  ACE_UNLOAD_HEAD HEAD=2
[gcode_macro ACEC__Unload_T3]
description: Unload T3 back to its ACE
gcode:
  ACE_UNLOAD_HEAD HEAD=3
[gcode_macro ACED__Dry_Start_0]
description: Start drying on ACE 0 (uses config temp/duration)
gcode:
  ACE_DRY ACE=0
[gcode_macro ACED__Dry_Start_1]
description: Start drying on ACE 1 (uses config temp/duration)
gcode:
  ACE_DRY ACE=1
[gcode_macro ACED__Dry_Start_2]
description: Start drying on ACE 2 (uses config temp/duration)
gcode:
  ACE_DRY ACE=2
[gcode_macro ACED__Dry_Start_3]
description: Start drying on ACE 3 (uses config temp/duration)
gcode:
  ACE_DRY ACE=3
[gcode_macro ACED__Dry_Stop]
description: Stop drying on current ACE
gcode:
  ACE_STOP_DRYING
[gcode_macro ACEG__Status]
description: Show active ACE, detected devices, and head mapping
gcode:
  ACE_HEAD_STATUS
[gcode_macro ACEG__List]
description: List all detected ACE devices
gcode:
  ACE_LIST
[gcode_macro ACEH__Update_Check]
description: Check GitHub for a newer multiACE release (no install)
gcode:
  ACE_UPDATE_CHECK
[gcode_macro ACEH__Update_Apply]
description: Download + install the latest multiACE release
gcode:
  ACE_UPDATE_APPLY
[gcode_macro INNER_RESUME]
description: Resume the actual running print (multiACE override)
variable_last_extruder_index: 0
variable_last_extruder_temp: 0
variable_extruder0_temp: 0
variable_extruder1_temp: 0
variable_extruder2_temp: 0
variable_extruder3_temp: 0
variable_is_pause_on_err: False
variable_is_runout: 0
variable_flow_calibrating: False
variable_flow_calibrate_temp: 220
variable_pos_e_compensation: False
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
    {% set sp_move = client.speed_move | default(velocity) %}
    {% set unretract = client.unretract | default(0.0) %}
    {% set retract = client.retract | default(5.0) | abs %}
    {% set can_resume = True %}
    {% set error_id = 522 %}
    {% set error_index = 0 %}
    {% set error_code = 0 %}
    {% set error_message = "resume error" %}
    {% set is_homed_z_before_paused = True %}
    {% set is_filament_exist = True %}
    {% set e_pos = 0 %}
    {% set is_replenish = params.REPLENISH | default(0) | int %}
    {% if is_replenish != 0 %}
        SET_GCODE_VARIABLE MACRO=INNER_RESUME VARIABLE=last_extruder_index VALUE={params.REPLENISH_EXTRUDER}
        {% set last_extruder_index = params.REPLENISH_EXTRUDER | default(last_extruder_index) | int %}
    {% endif %}
    {% if last_extruder_index == 0 %}
        {% set e_pos = printer['extruder'].printing_e_pos | float | abs %}
    {% else %}
        {% set e_pos = printer['extruder%d' % (last_extruder_index)].printing_e_pos | float | abs %}
    {% endif %}
    {% if pos_e_compensation %}
        {% if e_pos >= retract %}
            {% set e_pos = e_pos - retract %}
        {% else %}
            {% set e_pos = 0 %}
        {% endif %}
    {% endif %}
    {% if retract >= e_pos %}
        {% if unretract >= e_pos %}
            {% set unretract = unretract - e_pos %}
        {% else %}
            {% set unretract = 0 %}
        {% endif %}
    {% else %}
        {% set retract = e_pos + retract - unretract %}
        {% set unretract = 0 %}
    {% endif %}
    {% set runout_sensor_name = "e%d_filament" % (last_extruder_index)  %}
    {% set runout_sensor = "filament_motion_sensor e%d_filament" % (last_extruder_index) %}
    {% if "z" not in printer.toolhead.homed_axes %}
        {% set is_homed_z_before_paused = False %}
    {% endif %}
    {% if printer.print_task_config['filament_exist'][last_extruder_index] == False %}
        {% set is_filament_exist = False %}
    {% endif %}
    {% if is_replenish == 0 and is_filament_exist == True %}
        INNER_CHECK_AND_RELOAD_FILAMENT_INFO EXTRUDER={last_extruder_index} IS_RUNOUT={is_runout}
    {% endif %}
    {% if is_filament_exist == False %}
        {% set can_resume = False %}
    {% endif %}
    {% if can_resume == True %}
        {% if is_replenish != 0 %}
            SET_ACTION_CODE ACTION=PRINT_REPLENISHING
        {% else %}
            SET_ACTION_CODE ACTION=PRINT_RESUMING
        {% endif %}
        M118 last extruder temp is {last_extruder_temp}, last extruder index is {last_extruder_index}
        {% if is_pause_on_err and last_extruder_temp >= 170 %}
            M104 S{last_extruder_temp} T{last_extruder_index} A0
            M109 S{last_extruder_temp} T{last_extruder_index} A0
        {% endif %}
        {% if is_pause_on_err and "z" in printer.toolhead.homed_axes %}
            G91
            G1 Z10 F600
            G90
        {% endif %}
        {% if is_pause_on_err or "xy" not in printer.toolhead.homed_axes %}
            G28 X Y
        {% endif %}
        T{last_extruder_index} A0
        SM_PRINT_AUTO_FEED EXTRUDER={last_extruder_index}
        MOVE_TO_DISCARD_FILAMENT_POSITION
        {% if is_homed_z_before_paused == True %}
            G4 P200
            M400
            CHECK_FILAMENT_RUNOUT SENSOR={runout_sensor_name}
            M107
            M104 S{extruder0_temp} T0 A0
            M104 S{extruder1_temp} T1 A0
            M104 S{extruder2_temp} T2 A0
            M104 S{extruder3_temp} T3 A0
            SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout_on_pause}
            {% if extruder0_temp >= 170 %}
                M109 S{extruder0_temp} T0 A0
            {% endif %}
            {% if extruder1_temp >= 170 %}
                M109 S{extruder1_temp} T1 A0
            {% endif %}
            {% if extruder2_temp >= 170 %}
                M109 S{extruder2_temp} T2 A0
            {% endif %}
            {% if extruder3_temp >= 170 %}
                M109 S{extruder3_temp} T3 A0
            {% endif %}
            {% if last_extruder_temp > 170 %}
                M109 S{last_extruder_temp} T{last_extruder_index} A0
                INNER_APPLY_FLOW_K EXTRUDER={printer.toolhead.extruder} APPLY=1
                _CLIENT_EXTRUDE LENGTH=20 SPEED=2
                INNER_APPLY_FLOW_K EXTRUDER={printer.toolhead.extruder} APPLY=0
                _CLIENT_RETRACT LENGTH={retract}
                M400
                M106 S255
            {% else %}
                M106 S255
                M109 S{last_extruder_temp} T{last_extruder_index} A0
                {% set unretract = 0.0 %}
            {% endif %}
            M204 S10000
            M106 S255
            INNER_CUTOFF_BASE_DISCARD
            INNER_ROUGHLY_CLEAN_NOZZLE_BASE_DISCARD
            INNER_DISCARD_FILAMENT_BASE_DISCARD
            G90
            G1 Y250 F6000
            CHECK_FILAMENT_RUNOUT SENSOR={runout_sensor_name}
            RESUME_BASE VELOCITY={params.VELOCITY | default(sp_move)} MOVE_ACCEL=10000 EXTRUDE={unretract}
        {% else %}
            RESUME_BASE VELOCITY={params.VELOCITY | default(sp_move)} MOVE=0
        {% endif %}
        SET_GCODE_VARIABLE MACRO=INNER_RESUME VARIABLE=is_pause_on_err VALUE=False
        SET_GCODE_VARIABLE MACRO=INNER_RESUME VARIABLE=pos_e_compensation VALUE=False
        SET_GCODE_VARIABLE MACRO=INNER_RESUME VARIABLE=is_runout VALUE=0
    {% else %}
        {% if is_filament_exist == False %}
            {% set error_id = 523 %}
            {% set error_index = last_extruder_index %}
            {% set error_code = 0 %}
            {% set error_message = "e%d filament runout" % (last_extruder_index) %}
        {% else %}
            {% set error_id = 522 %}
            {% set error_index = 0 %}
            {% set error_code = 0 %}
            {% set error_message = "resume error" %}
        {% endif %}
        RAISE_EXCEPTION ID={error_id} INDEX={error_index} CODE={error_code} MSG='{"%s" % error_message}' LEVEL=2
    {% endif %}
    SET_ACTION_CODE ACTION=IDLE
